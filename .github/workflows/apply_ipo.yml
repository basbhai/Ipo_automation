name: Mero Share IPO Bulk Applicator

on:
  repository_dispatch:
    types: [trigger_ipo_bot]

jobs:
  apply_ipo:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas
          python -m playwright install chromium --with-deps

      # 4️⃣ Mask sensitive data (accounts)
      - name: Mask sensitive accounts
        run: echo "::add-mask::${{ github.event.client_payload.accounts }}"

      # 5️⃣ Run IPO application
      - name: Run IPO application script
        env:
          ACCOUNTS_JSON: ${{ github.event.client_payload.accounts }}
        run: python scripts/apply.py

      # 6️⃣ Upload logs/artifacts
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipo-application-logs
          path: |
            *.log
            apply_results.json

